<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>knct.dev</title>
<style>
  :root {
    --bg: #fff;
    --fg: #000;
    --muted: #666;
    --rule: #ddd;
    --link: #0000ee;
    --visited: #551a8b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: #999;
      --rule: #333;
      --link: #6ea8ff;
      --visited: #b48cff;
    }
  }
  html { background: var(--bg); color: var(--fg); }
  body {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 16px;
    line-height: 1.6;
    max-width: 640px;
    margin: 0 auto;
    padding: 3rem 1.25rem 2rem;
  }
  h1 { font-size: 1.25rem; margin: 0 0 2rem; font-weight: bold; }
  h2 { font-size: 1rem; margin: 2.5rem 0 1rem; font-weight: bold; }
  p { margin: 0 0 1.25rem; }
  ul { padding-left: 1.25rem; margin: 0 0 1.25rem; }
  li { margin-bottom: 0.5rem; }
  a { color: var(--link); }
  a:visited { color: var(--visited); }
  hr { border: 0; border-top: 1px solid var(--rule); margin: 3rem 0 1rem; }
  footer { color: var(--muted); font-size: 0.8rem; }
</style>
</head>
<body>

<h1>knct.dev</h1>

<p>a community of builders working on side projects that turn into real products.</p>

<p>we exchange knowledge, mix engineering and business, and share in what we ship together.</p>

<p>come for the building. if you're here for the money, you'll be disappointed.</p>

  <li><a href="https://discord.gg/tTSsenqhPH" target="_blank" rel="noopener">discord</a></li>
  <li><a href="https://github.com/knowledge-circuit" target="_blank" rel="noopener">github</a></li>
</ul>

<hr>
<footer>knct · 2026</footer>

</body>
</html>
